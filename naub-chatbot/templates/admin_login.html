<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — NAUB Chatbot</title>
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body class="login-body">
  <div class="bg-canvas">
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
        <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <path d="M16 46 L16 18 L26 18 L32 30 L38 18 L48 18 L48 46" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
        <path d="M20 38 L44 38" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="32" cy="10" r="3" fill="currentColor"/>
      </svg>
    </div>
    <h1 class="login-title">Admin Portal</h1>
    <p class="login-sub">NAUB Enquiry Chatbot — Staff Access</p>

    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="field-wrap">
        <label for="username" class="field-label">Username</label>
        <input type="text" id="username" name="username" class="field-input"
               placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="field-wrap">
        <label for="password" class="field-label">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" class="field-input"
                 placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="btn-spinner" style="display:none"></span>
      </button>
    </form>

    <p class="login-hint">Default: admin / naub@admin2024</p>
    <a href="/" class="back-link">← Back to Chatbot</a>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('errorMsg');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const togglePw = document.getElementById('togglePw');
    const pwInput = document.getElementById('password');

    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      const data = {
        username: document.getElementById('username').value.trim(),
        password: pwInput.value
      };

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          window.location.href = json.redirect;
        } else {
          errEl.textContent = json.error || 'Invalid credentials. Please try again.';
          errEl.style.display = 'block';
          btnText.style.display = 'inline';
          btnSpinner.style.display = 'none';
        }
      } catch {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.style.display = 'block';
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
